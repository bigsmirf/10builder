<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>10Builder</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

<div id="app-shell">

  <header class="topbar">
    <h1>10Builder</h1>
    <p>Build smarter. Launch faster. Improve easier.</p>
  </header>

  <div class="builder">

    <aside class="sidebar">
      <button class="component-btn" data-type="hero">+ Hero</button>
      <button class="component-btn" data-type="text">+ Text Block</button>
      <button class="component-btn" data-type="button">+ Button</button>
      <button class="component-btn" data-type="card">+ Card</button>
      <button class="component-btn" data-type="image">+ Image</button>
    </aside>

    <main class="canvas-wrapper">

      <div class="canvas-header">
        <h2>Builder Canvas</h2>
        <p>Hide the chaos. Expose the solution.</p>

        <div class="actions">
          <button id="preview-toggle">Preview</button>
          <button id="export-site" class="primary">Export</button>
          <button id="clear-canvas" class="danger">Clear Canvas</button>
        </div>
      </div>

      <div id="canvas" class="canvas"></div>

    </main>

    <aside id="properties-panel" class="properties"></aside>

  </div>

</div>

<script src="app.js?v=99"></script>

</body>
</html>
