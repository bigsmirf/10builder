<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>10Builder</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <div id="app-shell">

    <!-- HEADER -->
    <header class="header">
      <h1>10Builder</h1>
      <p>Build smarter. Launch faster. Improve easier.</p>
    </header>

    <div class="main">

      <!-- LEFT PANEL -->
      <aside class="sidebar">
        <button class="component-btn" data-type="hero">+ Hero</button>
        <button class="component-btn" data-type="text">+ Text Block</button>
        <button class="component-btn" data-type="button">+ Button</button>
        <button class="component-btn" data-type="card">+ Card</button>
        <button class="component-btn" data-type="image">+ Image</button>
      </aside>

      <!-- CANVAS AREA -->
      <section class="canvas-area">

        <div class="canvas-header">
          <h2>Builder Canvas</h2>
          <p>Hide the chaos. Expose the solution.</p>

          <div class="canvas-actions">
            <button id="preview-toggle">Preview</button>
            <button id="export-btn">Export</button>
            <button id="clear-canvas">Clear Canvas</button>
          </div>
        </div>

        <div id="canvas" class="canvas"></div>

      </section>

      <!-- RIGHT PANEL -->
      <aside id="properties-panel" class="properties-panel">
        <p>Select a block to edit it.</p>
      </aside>

    </div>

  </div>

  <!-- SCRIPT -->
  <script src="app.js"></script>

</body>
</html>
